<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Cut Studio · 有有特制版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-orange: #ff9500;
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.85);
            --apple-text: #1d1d1f;
            --apple-gray: #86868b;
        }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateY(-20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--apple-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            color: var(--apple-text);
            -webkit-font-smoothing: antialiased;
            padding-bottom: 80px;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        header { padding: 50px 0 30px; text-align: center; }
        header h1 { font-size: 42px; font-weight: 600; letter-spacing: -0.02em; }
        header p { font-size: 18px; color: var(--apple-gray); margin-top: 8px; }

        .glass-card {
            background: var(--apple-card);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            margin-bottom: 40px;
            overflow: hidden;
        }

        .studio-layout { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; padding: 40px; }
        .canvas-section { position: relative; }
        .drop-zone {
            width: 100%; height: 500px; background: #fff; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative; overflow: hidden; cursor: pointer;
        }
        .drop-zone.drag-over { border: 2px solid var(--apple-blue); background: rgba(0,113,227,0.03); transform: scale(1.01); }
        
        canvas { max-width: 96%; max-height: 96%; cursor: crosshair; z-index: 2; border-radius: 4px; }
        
        .upload-ui { text-align: center; pointer-events: none; }
        .upload-ui .icon { font-size: 60px; margin-bottom: 16px; display: block; opacity: 0.8; }
        
        .mode-badge {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: var(--apple-orange); color: white; padding: 6px 16px;
            border-radius: 50px; font-size: 13px; font-weight: 600;
            box-shadow: 0 4px 12px rgba(255,149,0,0.3);
            display: flex; align-items: center; gap: 8px;
        }

        .controls { display: flex; flex-direction: column; gap: 24px; }
        .control-group-title { font-size: 11px; font-weight: 700; color: var(--apple-gray); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
        
        .stepper-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .stepper {
            background: #fff; padding: 12px 16px; border-radius: 16px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .stepper button { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--apple-bg); color: var(--apple-text); font-size: 18px; cursor: pointer; transition: 0.2s; }
        .stepper button:hover { background: #e8e8ed; }
        .stepper input { border: none; width: 30px; text-align: center; font-size: 16px; font-weight: 600; }

        .instant-preview { background: rgba(0,0,0,0.02); border-radius: 20px; padding: 20px; }
        #previewContainer { width: 100%; background: #fff; border: 1px solid rgba(0,0,0,0.05); border-radius: 12px; overflow: hidden; position: relative; transition: height 0.3s ease; }
        .preview-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--apple-gray); font-size: 12px; gap: 8px; text-align: center; padding: 20px; }
        .thumb-grid { display: grid; width: 100%; height: 100%; gap: 2px; padding: 2px; }
        .thumb-item { width: 100%; height: 100%; background: #f0f0f0; overflow: hidden; }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

        .btn { padding: 14px 20px; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--apple-blue); color: #fff; }
        .btn-secondary { background: #fff; color: var(--apple-text); border: 1px solid #d2d2d7; }
        .btn-ghost { background: transparent; color: var(--apple-blue); font-size: 13px; font-weight: 600; padding: 4px 8px; cursor: pointer; border: none; }

        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 20px; margin-top: 20px; }
        .result-card { background: #fff; border-radius: 20px; padding: 10px; position: relative; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1); border: 1px solid rgba(0,0,0,0.03); cursor: pointer; }
        .result-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .result-card.selected { border: 2.5px solid var(--apple-blue); background: rgba(0,113,227,0.02); }
        .result-card.selected::before { content: "✓"; position: absolute; top: -8px; left: -8px; width: 24px; height: 24px; background: var(--apple-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; z-index: 5; }
        .result-card img { width: 100%; border-radius: 14px; display: block; pointer-events: none; }
        .card-actions { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 6px; opacity: 0; transform: translateX(8px); transition: 0.3s; z-index: 10; }
        .result-card:hover .card-actions { opacity: 1; transform: translateX(0); }
        .action-btn { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-download { background: var(--apple-blue); color: white; }
        .btn-resplit { background: var(--apple-orange); color: white; }

        /* 重组拼图样式 */
        .puzzle-section { margin-top: 60px; padding: 30px; background: var(--apple-card); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255,255,255,0.7); border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
        .puzzle-container { display: flex; gap: 40px; align-items: flex-start; flex-wrap: wrap; }
        .puzzle-preview { width: 300px; height: 300px; background: #1d1d1f; border-radius: 24px; display: grid; gap: 4px; padding: 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .puzzle-cell { background: #2c2c2e; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .puzzle-cell img { width: 100%; height: 100%; object-fit: cover; }
        .puzzle-cell.empty { background: #1c1c1e; }
        .puzzle-upload-btn { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 16px; line-height: 1; border: none; z-index: 10; }
        .puzzle-upload-btn:hover { background: var(--apple-blue); }
        .puzzle-actions { flex: 1; }
        .puzzle-actions p { color: var(--apple-gray); margin-bottom: 20px; line-height: 1.5; }

        .hidden { display: none !important; }
        svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    </style>

    <script async crossorigin="anonymous" data-clerk-publishable-key="pk_live_Y2xlcmsuZ3JpZGN1dHN0dWRpby5jbiQ" src="https://clerk.gridcutstudio.cn/npm/@clerk/clerk-js@5/dist/clerk.browser.js" type="text/javascript"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>Grid Cut Studio</h1>
        <p>专业、纯粹的影像拆解工具 · 有有特制</p>
    </header>

    <div style="display: flex; justify-content: center; margin-bottom: 24px; min-height: 40px;">
        <div id="user-button"></div>
    </div>

    <div class="glass-card">
        <div class="studio-layout">
            <div class="canvas-section">
                <div class="drop-zone" id="dropZone">
                    <div id="uploadUI" class="upload-ui">
                        <span class="icon">􀈄</span>
                        <p style="font-weight: 600; font-size: 18px;">添加照片</p>
                        <p style="color: var(--apple-gray); font-size: 14px; margin-top: 4px;">或拖拽至此</p>
                    </div>
                    <div id="modeTag" class="mode-badge hidden">
                        <svg viewBox="0 0 24 24"><circle cx="6" cy="7" r="3"/><circle cx="6" cy="17" r="3"/><path d="M20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12"/></svg>
                        二次切割模式
                    </div>
                    <canvas id="mainCanvas" class="hidden"></canvas>
                </div>
                <input type="file" id="fileIn" class="hidden" accept="image/*">
            </div>

            <div class="controls">
                <button class="btn btn-secondary" onclick="document.getElementById('fileIn').click()">导入图片</button>
                <div>
                    <p class="control-group-title">行列设定</p>
                    <div class="stepper-container">
                        <div class="stepper">
                            <button onclick="updateGrid('rows', -1)">-</button>
                            <input type="number" id="rowsInput" value="3" min="1" max="10" readonly>
                            <button onclick="updateGrid('rows', 1)">+</button>
                        </div>
                        <div class="stepper">
                            <button onclick="updateGrid('cols', -1)">-</button>
                            <input type="number" id="colsInput" value="3" min="1" max="10" readonly>
                            <button onclick="updateGrid('cols', 1)">+</button>
                        </div>
                    </div>
                </div>

                <div class="instant-preview">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <p class="control-group-title" style="margin:0">效果预览</p>
                        <button class="btn-ghost" onclick="renderPreview()">生成预览</button>
                    </div>
                    <div id="previewContainer" style="height: 120px;">
                        <div id="previewInner" style="height: 100%;">
                            <div class="preview-placeholder">
                                <svg viewBox="0 0 24 24" style="stroke: #d2d2d7; width:24px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <span>点击查看比例预览</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="actionArea">
                    <div id="normalBtns">
                        <button class="btn btn-primary" style="width:100%" onclick="confirmSplit()">确认拆分</button>
                    </div>
                    <div id="secondaryBtns" class="hidden" style="display:flex; gap:12px;">
                        <button class="btn btn-primary" style="flex:1; background:var(--apple-orange)" onclick="confirmSecondary()">完成切割</button>
                        <button class="btn btn-secondary" style="width:80px; color:#ff3b30" onclick="cancelSecondary()">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px;">
        <h2 style="font-size: 26px; font-weight: 600;">已拆分切片</h2>
        <div style="display:flex; gap:12px;">
            <button id="selectedDownloadBtn" class="btn btn-primary" style="border-radius:40px; padding:8px 24px; font-size:14px; opacity: 0.5; pointer-events: none;" onclick="downloadSelected()">下载选中 (0)</button>
            <button class="btn btn-secondary" style="border-radius:40px; padding:8px 20px; font-size:14px;" onclick="downloadAll()">全部打包下载</button>
        </div>
    </div>
    <div class="result-grid" id="resultGrid"></div>

    <div class="puzzle-section">
        <h2 style="font-size: 26px; font-weight: 600; margin-bottom: 20px;">重组拼图</h2>
        <div class="puzzle-container">
            <div class="puzzle-preview" id="puzzlePreview"></div>
            <div class="puzzle-actions">
                <p><b>✨ 自由拼图模式</b>：即使不切割图片，也可直接点击下方按钮初始化网格，再点击格子上的 <b>+</b> 号上传本地图片。<br>（支持拖动格子交换位置）</p>
                <div style="margin-bottom: 15px;">
                    <label style="margin-right: 10px; color: var(--apple-gray);">拼图形状：</label>
                    <select id="puzzleShapeSelect" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #d2d2d7; background: white;">
                        <option value="3x3" selected>3x3 (9格)</option>
                        <option value="3x2">3x2 (6格)</option>
                        <option value="2x2">2x2 (4格)</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="margin-right: 10px; color: var(--apple-gray);">下载比例：</label>
                    <select id="puzzleRatioSelect" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #d2d2d7; background: white;">
                        <option value="16:9" selected>16:9 横屏 (2560×1440)</option>
                        <option value="9:16">9:16 竖屏 (1440×2560)</option>
                    </select>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button id="generatePuzzleBtn" class="btn btn-primary" onclick="generatePuzzle()">生成拼图网格</button>
                    <button id="downloadPuzzleBtn" class="btn btn-secondary" onclick="downloadPuzzle()">下载拼图</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const MEMBER_WHITELIST = ["zhuangshanmeizi@gmail.com", "766307121@qq.com", "1340795703@qq.com", "424198398@qq.com", "595186012@qq.com"];
    
    let isUserButtonMounted = false, lastUserStatus = null;
    let originalImage = null, linesX = [], linesY = [];
    let isDragging = false, dragAxis = null, dragIndex = -1;
    let secondaryMode = false, selectedRegion = null;
    let currentSecondaryCard = null, draggedCell = null, puzzleCanvas = null;

    const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');
    const fileIn = document.getElementById('fileIn'), dropZone = document.getElementById('dropZone');

    function isAuthorized() { const user = window.Clerk?.user; return user && MEMBER_WHITELIST.includes(user.primaryEmailAddress?.emailAddress); }
    function requireAuth() { if (!isAuthorized() && lastUserStatus === 'EXPIRED') { alert('体验已结束，请先登录或升级会员。'); return false; } return true; }

    function revokeAllCardURLs() { document.querySelectorAll('.result-card img').forEach(img => { if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src); }); }
    function clearResultGrid() { revokeAllCardURLs(); document.getElementById('resultGrid').innerHTML = ''; updateSelectionUI(); }
    function updateSelectionUI() { const selected = document.querySelectorAll('.result-card.selected'); const btn = document.getElementById('selectedDownloadBtn'); btn.innerText = `下载选中 (${selected.length})`; btn.style.opacity = selected.length > 0 ? '1' : '0.5'; btn.style.pointerEvents = selected.length > 0 ? 'auto' : 'none'; }
    function toggleSelect(card) { card.classList.toggle('selected'); updateSelectionUI(); }

    function initLines(w, h) {
        const r = parseInt(document.getElementById('rowsInput').value), c = parseInt(document.getElementById('colsInput').value);
        linesX = []; linesY = [];
        for(let i=1; i<c; i++) linesX.push((w/c)*i);
        for(let i=1; i<r; i++) linesY.push((h/r)*i);
    }
    function draw() {
        if(!originalImage) return;
        if(secondaryMode) { canvas.width = selectedRegion.w; canvas.height = selectedRegion.h; ctx.drawImage(originalImage, selectedRegion.x, selectedRegion.y, selectedRegion.w, selectedRegion.h, 0, 0, selectedRegion.w, selectedRegion.h); ctx.strokeStyle = '#ff9500'; }
        else { canvas.width = originalImage.width; canvas.height = originalImage.height; ctx.drawImage(originalImage, 0, 0); ctx.strokeStyle = '#0071e3'; }
        ctx.setLineDash([12, 6]); ctx.lineWidth = Math.max(3, canvas.width / 350);
        linesX.forEach(x => { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); });
        linesY.forEach(y => { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); });
    }
    function updateGrid(type, delta) {
        const input = document.getElementById(type + 'Input');
        let val = Math.max(1, Math.min(10, parseInt(input.value) + delta));
        input.value = val;
        if(originalImage) { secondaryMode ? initLines(selectedRegion.w, selectedRegion.h) : initLines(originalImage.width, originalImage.height); draw(); resetPreview(); }
    }

    function resetPreview() { const container = document.getElementById('previewContainer'); container.style.height = '120px'; document.getElementById('previewInner').innerHTML = `<div class="preview-placeholder"><svg viewBox="0 0 24 24" style="stroke: #d2d2d7; width:20px;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span>点击生成预览</span></div>`; }
    function renderPreview() {
        if(!originalImage) return;
        const container = document.getElementById('previewContainer');
        const currentW = secondaryMode ? selectedRegion.w : originalImage.width;
        const currentH = secondaryMode ? selectedRegion.h : originalImage.height;
        container.style.height = Math.min(300, container.offsetWidth * (currentH / currentW)) + 'px';
        const rows = parseInt(document.getElementById('rowsInput').value), cols = parseInt(document.getElementById('colsInput').value);
        document.getElementById('previewInner').innerHTML = `<div class="thumb-grid" id="thumbGrid" style="grid-template-columns: repeat(${cols}, 1fr); grid-template-rows: repeat(${rows}, 1fr);"></div>`;
        const sortedX = [0, ...[...linesX].sort((a,b)=>a-b), canvas.width], sortedY = [0, ...[...linesY].sort((a,b)=>a-b), canvas.height];
        for(let i=0; i<sortedY.length-1; i++) {
            for(let j=0; j<sortedX.length-1; j++) {
                const w = sortedX[j+1] - sortedX[j], h = sortedY[i+1] - sortedY[i];
                if(w<1 || h<1) continue;
                const off = document.createElement('canvas'); off.width = w; off.height = h;
                off.getContext('2d').drawImage(originalImage, secondaryMode ? selectedRegion.x + sortedX[j] : sortedX[j], secondaryMode ? selectedRegion.y + sortedY[i] : sortedY[i], w, h, 0, 0, w, h);
                const div = document.createElement('div'); div.className = 'thumb-item'; div.innerHTML = `<img src="${off.toDataURL('image/png')}">`;
                document.getElementById('thumbGrid').appendChild(div);
            }
        }
    }

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => { originalImage = img; document.getElementById('uploadUI').classList.add('hidden'); canvas.classList.remove('hidden'); cancelSecondary(); initLines(img.width, img.height); draw(); resetPreview(); clearResultGrid(); };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); const file = e.dataTransfer.files[0]; if (file && file.type.startsWith('image/')) handleFile(file); });
    dropZone.onclick = (e) => { if(e.target === dropZone || e.target.closest('.upload-ui')) fileIn.click(); };
    fileIn.onchange = (e) => { if(e.target.files[0]) handleFile(e.target.files[0]); };

    function getMouse(e) { const rect = canvas.getBoundingClientRect(); return { x: (e.clientX - rect.left) * (canvas.width / rect.width), y: (e.clientY - rect.top) * (canvas.height / rect.height) }; }
    canvas.onmousedown = (e) => {
        const p = getMouse(e), t = canvas.width / 40;
        linesX.forEach((x, i) => { if(Math.abs(p.x - x) < t) { isDragging = true; dragAxis = 'x'; dragIndex = i; } });
        if(!isDragging) linesY.forEach((y, i) => { if(Math.abs(p.y - y) < t) { isDragging = true; dragAxis = 'y'; dragIndex = i; } });
    };
    window.onmousemove = (e) => {
        if(isDragging && originalImage) {
            const p = getMouse(e);
            if(dragAxis === 'x') { let minX = dragIndex > 0 ? linesX[dragIndex-1] + 5 : 5, maxX = dragIndex < linesX.length-1 ? linesX[dragIndex+1] - 5 : canvas.width - 5; linesX[dragIndex] = Math.max(minX, Math.min(maxX, p.x)); }
            else { let minY = dragIndex > 0 ? linesY[dragIndex-1] + 5 : 5, maxY = dragIndex < linesY.length-1 ? linesY[dragIndex+1] - 5 : canvas.height - 5; linesY[dragIndex] = Math.max(minY, Math.min(maxY, p.y)); }
            draw(); resetPreview();
        }
    };
    window.onmouseup = () => { isDragging = false; };

    function confirmSplit(bx=0, by=0) {
        if(!originalImage) return alert('请先上传图片'); if (!requireAuth()) return;
        const grid = document.getElementById('resultGrid'); if(!secondaryMode) clearResultGrid();
        const sortedX = [0, ...[...linesX].sort((a,b)=>a-b), canvas.width], sortedY = [0, ...[...linesY].sort((a,b)=>a-b), canvas.height];
        for(let i=0; i<sortedY.length-1; i++) {
            for(let j=0; j<sortedX.length-1; j++) {
                const w = sortedX[j+1] - sortedX[j], h = sortedY[i+1] - sortedY[i], curX = bx + sortedX[j], curY = by + sortedY[i];
                const off = document.createElement('canvas'); off.width = w; off.height = h; off.getContext('2d').drawImage(originalImage, curX, curY, w, h, 0, 0, w, h);
                off.toBlob((blob) => {
                    const url = URL.createObjectURL(blob), card = document.createElement('div');
                    card.className = 'result-card'; card.onclick = (e) => { if(!e.target.closest('.action-btn')) toggleSelect(card); };
                    card.dataset.x = curX; card.dataset.y = curY; card.dataset.w = w; card.dataset.h = h;
                    card.innerHTML = `<img src="${url}"><div class="card-actions"><div class="action-btn btn-download" onclick="downloadUrl('${url}')"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></div><div class="action-btn btn-resplit" onclick="startSecondary(this)"><svg viewBox="0 0 24 24"><circle cx="6" cy="7" r="3"/><circle cx="6" cy="17" r="3"/><path d="M20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12"/></svg></div></div>`;
                    grid.appendChild(card);
                });
            }
        }
        updateSelectionUI();
    }

    function startSecondary(btn) {
        const card = btn.closest('.result-card'); if (!card) return; currentSecondaryCard = card;
        const x = parseFloat(card.dataset.x), y = parseFloat(card.dataset.y), w = parseFloat(card.dataset.w), h = parseFloat(card.dataset.h);
        secondaryMode = true; selectedRegion = {x, y, w, h}; document.getElementById('normalBtns').classList.add('hidden'); document.getElementById('secondaryBtns').classList.remove('hidden'); document.getElementById('modeTag').classList.remove('hidden');
        initLines(w, h); draw(); resetPreview(); window.scrollTo({top: 0, behavior: 'smooth'});
    }
    function confirmSecondary() { if (!requireAuth()) return; confirmSplit(selectedRegion.x, selectedRegion.y); if (currentSecondaryCard) { currentSecondaryCard.remove(); currentSecondaryCard = null; } cancelSecondary(); }
    function cancelSecondary() { secondaryMode = false; selectedRegion = null; currentSecondaryCard = null; document.getElementById('normalBtns').classList.remove('hidden'); document.getElementById('secondaryBtns').classList.add('hidden'); document.getElementById('modeTag').classList.add('hidden'); if(originalImage) { initLines(originalImage.width, originalImage.height); draw(); resetPreview(); } }

    // ==========================================
    // 拼图功能 (已增强：支持空图片生成)
    // ==========================================
    function generatePuzzle() {
        if (!requireAuth()) return;
        
        let cards = document.querySelectorAll('.result-card.selected');
        if (cards.length === 0) cards = document.querySelectorAll('.result-card');
        
        const shape = document.getElementById('puzzleShapeSelect').value;
        let rows = (shape === '3x3' || shape === '3x2') ? 3 : 2;
        let cols = (shape === '3x3') ? 3 : 2;
        const total = rows * cols, selected = Array.from(cards).slice(0, total);
        
        const div = document.getElementById('puzzlePreview');
        div.innerHTML = ''; div.style.gridTemplateColumns = `repeat(${cols}, 1fr)`; div.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        
        for (let i = 0; i < total; i++) {
            const cell = document.createElement('div');
            cell.className = 'puzzle-cell'; cell.setAttribute('draggable', 'true'); cell.setAttribute('data-index', i);
            cell.setAttribute('ondragstart', 'dragStart(event)'); cell.setAttribute('ondragover', 'event.preventDefault()'); cell.setAttribute('ondrop', 'dropOnCell(event)');
            if (i < selected.length) { const img = document.createElement('img'); img.src = selected[i].querySelector('img').src; cell.appendChild(img); } 
            else { cell.classList.add('empty'); }
            
            const btn = document.createElement('button'); btn.className = 'puzzle-upload-btn';
            btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 4v16M4 12h16"/></svg>';
            btn.onclick = (e) => { e.stopPropagation(); triggerFileUpload(cell); };
            cell.appendChild(btn); div.appendChild(cell);
        }
        updatePuzzleCanvas();
    }

    function dragStart(ev) { draggedCell = ev.target.closest('.puzzle-cell'); ev.dataTransfer.setData('text/plain', draggedCell.dataset.index); }
    function dropOnCell(ev) {
        ev.preventDefault(); const target = ev.target.closest('.puzzle-cell');
        if (!target || !draggedCell || target === draggedCell) return;
        const temp = target.innerHTML; target.innerHTML = draggedCell.innerHTML; draggedCell.innerHTML = temp;
        [target, draggedCell].forEach(cell => { const btn = cell.querySelector('.puzzle-upload-btn'); if (btn) btn.onclick = (e) => { e.stopPropagation(); triggerFileUpload(cell); }; });
        updatePuzzleCanvas(); draggedCell = null;
    }

    function triggerFileUpload(cell) {
        const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const r = new FileReader();
                r.onload = (ex) => {
                    cell.innerHTML = ''; const img = document.createElement('img'); img.src = ex.target.result; cell.appendChild(img);
                    const b = document.createElement('button'); b.className = 'puzzle-upload-btn'; b.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 4v16M4 12h16"/></svg>';
                    b.onclick = (ex2) => { ex2.stopPropagation(); triggerFileUpload(cell); }; cell.appendChild(b); cell.classList.remove('empty'); updatePuzzleCanvas();
                };
                r.readAsDataURL(file);
            }
        };
        inp.click();
    }

    function updatePuzzleCanvas() {
        const cells = document.querySelectorAll('.puzzle-cell'); if (cells.length === 0) return;
        const ratio = document.getElementById('puzzleRatioSelect').value;
        let w = (ratio === '9:16') ? 1440 : 2560, h = (ratio === '9:16') ? 2560 : 1440;
        const shape = document.getElementById('puzzleShapeSelect').value;
        let rows = (shape === '3x3' || shape === '3x2') ? 3 : 2, cols = (shape === '3x3') ? 3 : 2;
        puzzleCanvas = document.createElement('canvas'); puzzleCanvas.width = w; puzzleCanvas.height = h;
        const pCtx = puzzleCanvas.getContext('2d'); pCtx.fillStyle = '#000'; pCtx.fillRect(0, 0, w, h);
        const cw = w / cols, ch = h / rows;
        cells.forEach((cell, i) => { const col = i % cols, row = Math.floor(i / cols), img = cell.querySelector('img'); if (img) pCtx.drawImage(img, col * cw, row * ch, cw, ch); });
    }

    function downloadPuzzle() {
        if (!puzzleCanvas) return alert('请先生成拼图网格'); if (!requireAuth()) return;
        updatePuzzleCanvas();
        puzzleCanvas.toBlob(b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'puzzle.png'; a.click(); });
    }

    window.downloadUrl = (url) => { const a = document.createElement('a'); a.href = url; a.download = 'slice.png'; a.click(); };
    async function bundleZip(imgNodes, fileName) {
        const zip = new JSZip();
        for (let i = 0; i < imgNodes.length; i++) {
            const dataUrl = await new Promise(res => { const r = new FileReader(); fetch(imgNodes[i].src).then(x => x.blob()).then(b => { r.onload = () => res(r.result); r.readAsDataURL(b); }); });
            zip.file(`piece_${i+1}.png`, dataUrl.split(',')[1], {base64: true});
        }
        zip.generateAsync({type: 'blob'}).then(b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = fileName + '.zip'; a.click(); });
    }
    async function downloadSelected() { if (requireAuth()) bundleZip(document.querySelectorAll('.result-card.selected img'), 'Selected'); }
    async function downloadAll() { if (requireAuth()) bundleZip(document.querySelectorAll('.result-grid img'), 'All'); }

    function applyLock(type, minutesLeft = 0) {
        const area = document.getElementById('actionArea'); if (!area) return;
        const old = document.getElementById('login-tip'); if (old) old.remove();
        const btns = [document.getElementById('normalBtns'), document.getElementById('secondaryBtns')];
        btns.forEach(b => { if(b) { b.style.opacity = (type==='NOT_LOGGED_IN'||type==='EXPIRED') ? "0.2" : "1"; b.style.pointerEvents = (type==='NOT_LOGGED_IN'||type==='EXPIRED') ? "none" : "auto"; b.style.filter = (type==='NOT_LOGGED_IN'||type==='EXPIRED') ? "grayscale(1)" : "none"; } });
        if (type === 'NOT_LOGGED_IN') showTip("🔒 <b>功能已锁定</b><br><small>登录获取 1 小时试用</small>");
        else if (type === 'EXPIRED') showTip(`⏳ <b>试用结束</b><br><button onclick="payForVIP()" style="margin-top:10px; width:100%; padding:10px; background:#0071e3; color:white; border:none; border-radius:8px; cursor:pointer;">💎 解锁年度会员 (￥9.9)</button>`);
        else if (type === 'TRIAL') showTip(`✨ <b>体验中</b><br><small>剩余 ${minutesLeft} 分钟</small>`);
        else showTip(`👑 <b>尊贵会员</b>`);
    }

    function showTip(msg) { const tip = document.createElement('p'); tip.id = "login-tip"; tip.innerHTML = msg; tip.style.cssText = `background:rgba(255,255,255,0.7); backdrop-filter:blur(12px); border-radius:20px; padding:20px; text-align:center; margin-bottom:20px; box-shadow:0 8px 32px rgba(0,0,0,0.05); animation:slideIn 0.4s forwards;`; document.getElementById('actionArea').prepend(tip); }
    function payForVIP() { window.location.href = "https://m91iv9q6e6.sealosbja.site/pay?userid=" + Clerk.user.id; }

    async function handleUser(user) {
        if (!isUserButtonMounted) { Clerk.mountUserButton(document.getElementById('user-button'), { afterSignOutUrl: window.location.href }); isUserButtonMounted = true; }
        const isWhite = isAuthorized();
        const trialEnd = new Date(new Date(user.createdAt).getTime() + 3600000), now = new Date();
        const type = (user.publicMetadata?.isPro || isWhite) ? 'UNLOCK' : (now < trialEnd ? 'TRIAL' : 'EXPIRED');
        const timeLeft = (type === 'TRIAL') ? Math.ceil((trialEnd - now) / 60000) : 0;
        if (lastUserStatus !== type) { lastUserStatus = type; applyLock(type, timeLeft); }
    }

    window.addEventListener('load', async () => {
        if (window.Clerk) {
            await Clerk.load();
            Clerk.addListener(({ user }) => {
                if (user) handleUser(user);
                else { isUserButtonMounted = false; lastUserStatus = null; applyLock('NOT_LOGGED_IN'); document.getElementById('user-button').innerHTML = ''; Clerk.mountSignIn(document.getElementById('user-button')); }
            });
            if (Clerk.user) handleUser(Clerk.user);
        }
    });
</script>
